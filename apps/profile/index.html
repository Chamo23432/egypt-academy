<div class="profile-app">
  <h2 class="profile-title">Your Profile</h2>

  <label class="profile-label">Student name</label>
  <input class="profile-input" id="profile-name" type="text" />

  <div id="profile-pass-section">
    <label class="profile-label" id="profile-pass-label">Password</label>
    <input class="profile-input" id="profile-pass" type="password" placeholder="New password" />
    <input class="profile-input" id="profile-pass-confirm" type="password" placeholder="Confirm password" />
  </div>

  <button class="profile-save-btn" id="profile-save">Save changes</button>
  <p class="profile-feedback" id="profile-feedback"></p>
</div>
