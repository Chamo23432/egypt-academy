  </p>
  <div class="khufu-facts">

      <span class="fact-number">146m</span>
      <span class="fact-label">Original height</span>

    <div class="khufu-fact-card">
      <span class="fact-number">2.3M</span>
      <span class="fact-label">Limestone blocks</span>
    </div>
    <div class="khufu-fact-card">
      <span class="fact-number">20yrs</span>
      <span class="fact-label">Construction time</span>
    </div>
  </div>
</div>
