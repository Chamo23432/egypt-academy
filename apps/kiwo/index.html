<div class="kiwo-app">
  <div class="kiwo-sidebar glass-panel">
    <h3>Kiwo</h3>
    <button class="kiwo-new-chat-btn" id="kiwo-new-chat-btn">+ New chat</button>
    <div class="kiwo-convo-list" id="kiwo-convo-list"></div>
  </div>

  <div class="kiwo-main glass-panel" style="padding:0;">
    <div class="kiwo-main-header">
      <h2 id="kiwo-convo-title">New chat</h2>
      <span class="kiwo-mode-indicator" id="kiwo-mode-indicator">Online</span>
    </div>
    <div class="kiwo-messages" id="kiwo-messages"></div>
    <div class="kiwo-input-row">
      <button class="kiwo-file-btn" id="kiwo-file-btn" aria-label="Attach file">📎</button>
      <input type="file" id="kiwo-file-input" style="display:none;" />
      <input type="text" id="kiwo-text-input" class="kiwo-text-input" placeholder="Ask Kiwo anything..." autocomplete="off" />
      <button class="kiwo-send-btn" id="kiwo-send-btn">Send</button>
    </div>
  </div>
</div>
