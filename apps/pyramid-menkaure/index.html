  <h2 class="menkaure-title">The Pyramid of Menkaure</h2>
  <p class="menkaure-intro">
    The smallest of the three Giza pyramids, built for Pharaoh Menkaure.
    Its lower layers were once covered in pink granite rather than
    limestone, which was rare and expensive to transport.
  </p>

    <div class="menkaure-fact-card"><span class="fact-number">65m</span><span class="fact-label">Original height</span></div>

    <div class="menkaure-fact-card"><span class="fact-number">3rd</span><span class="fact-label">Largest at Giza</span></div>
  </div>
</div>
