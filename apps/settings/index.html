<div class="settings-app">
  <h2 class="settings-title">Settings</h2>

  <div class="settings-section">
    <h3 class="settings-heading"><svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Account</h3>
    <label class="profile-label">Student name</label>
    <input class="profile-input" id="profile-name" type="text" />
    <div id="profile-pass-section">
      <label class="profile-label" id="profile-pass-label">Password</label>
      <input class="profile-input" id="profile-pass" type="password" placeholder="New password" />
      <input class="profile-input" id="profile-pass-confirm" type="password" placeholder="Confirm password" />
    </div>
    <button class="profile-save-btn" id="profile-save">Save account changes</button>
    <p class="profile-feedback" id="profile-feedback"></p>
  </div>

  <div class="settings-section">
    <h3 class="settings-heading"><svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>Theme</h3>
    <div class="theme-options">
      <button class="theme-btn" data-theme-value="default">
        <span class="theme-swatch theme-swatch-default"></span>
        Default
      </button>
      <button class="theme-btn" data-theme-value="dark">
        <span class="theme-swatch theme-swatch-dark"></span>
        Dark
      </button>
      <button class="theme-btn" data-theme-value="light">
        <span class="theme-swatch theme-swatch-light"></span>
        Light
      </button>
    </div>
  </div>

  <div class="settings-section">
    <h3 class="settings-heading"><svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M15.09 8A6 6 0 0 0 6 9c0 2 1 3.5 2.5 4.5S9 16 9 18h6c0-2 .5-3.5 2-4.5S18 11 18 9a6 6 0 0 0-2.91-1"/></svg>Ambient Lighting</h3>
    <p class="settings-note">A softer, warmer, cozier atmosphere across the whole app.</p>
    <label class="settings-toggle-row">
      <span>Enable ambient lighting</span>
      <input type="checkbox" id="setting-ambient-lighting" />
    </label>
  </div>

  <div class="settings-section">
    <h3 class="settings-heading"><svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/><circle cx="12" cy="12" r="3"/></svg>Lesson hotspots</h3>
    <label class="settings-toggle-row">
      <span>Show hotspot labels always (not just on hover)</span>
      <input type="checkbox" id="setting-always-labels" />
    </label>
    <label class="settings-toggle-row">
      <span>Reduce motion (disable pulsing hotspots)</span>
      <input type="checkbox" id="setting-reduce-motion" />
    </label>
  </div>

  <div class="settings-section">
    <h3 class="settings-heading"><svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3"/><path d="M1 14h6M9 8h6M17 16h6"/></svg>Preferences</h3>
    <button class="settings-btn-secondary" id="reset-settings-btn">Reset settings to defaults</button>
  </div>

  <div class="settings-section">
    <h3 class="settings-heading"><svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18.7 8l-5.7 5.7-3-3-3.7 3.7"/></svg>Progress</h3>
    <button class="settings-danger-btn" id="reset-progress-btn">Reset all lesson &amp; quiz progress</button>
  </div>

  <div class="settings-section">
    <h3 class="settings-heading"><svg class="settings-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>Danger zone</h3>
    <p class="settings-note">Deleting your account removes your name, password, recovery code, and all progress from this browser. This cannot be undone.</p>
    <button class="settings-danger-btn" id="delete-account-btn">Delete account</button>
  </div>

  <p class="settings-feedback" id="settings-feedback"></p>
</div>
